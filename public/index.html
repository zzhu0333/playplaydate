<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🏀 籃球約團投票</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:#0f1115; --panel:#181b22; --panel2:#1f232c; --line:#2b303b;
    --ink:#f2f4f8; --muted:#8b93a3; --accent:#ff6a2b; --accent2:#ffb347;
    --on:#241a12; --onb:#ff6a2b; --good:#5ad36a;
  }
  body {
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,106,43,.14), transparent 60%),
      radial-gradient(700px 400px at -10% 5%, rgba(255,179,71,.08), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    min-height:100vh; padding:16px 14px 120px;
  }
  .wrap { max-width:480px; margin:0 auto; }
  .head { padding:8px 2px 16px; }
  .title { font-size:24px; font-weight:800; letter-spacing:-.01em; line-height:1.2; }
  .sub { color:var(--muted); font-size:13px; margin-top:6px; }
  .me { color:var(--accent2); font-size:13px; margin-top:4px; }

  .hint { color:var(--muted); font-size:12.5px; margin:4px 2px 12px; }

  .slot {
    background:var(--panel); border:2px solid var(--line); border-radius:16px;
    padding:14px 16px; margin-bottom:10px; cursor:pointer; position:relative;
    transition:border-color .15s, background .15s, transform .08s;
    display:flex; align-items:center; gap:14px;
  }
  .slot:active { transform:scale(.99); }
  .slot.on { border-color:var(--onb); background:var(--on); }
  .check {
    width:24px; height:24px; flex:none; border-radius:50%;
    border:2px solid var(--line); display:grid; place-items:center;
    transition:all .15s;
  }
  .slot.on .check { background:var(--accent); border-color:var(--accent); }
  .check svg { width:14px; height:14px; opacity:0; transition:opacity .15s; }
  .slot.on .check svg { opacity:1; }
  .slot-main { flex:1; min-width:0; }
  .slot-time { font-size:15.5px; font-weight:600; letter-spacing:.02em; }
  .slot-venue { font-size:13px; color:var(--muted); margin-top:3px; }
  .slot-count {
    flex:none; text-align:right; font-size:12px; color:var(--accent2);
    display:flex; flex-direction:column; align-items:flex-end; gap:2px;
  }
  .slot-count .n { font-size:17px; font-weight:800; }
  .voters-mini { font-size:11px; color:var(--muted); margin-top:8px; line-height:1.5; }

  /* 誰投/誰沒投 區塊 */
  .tabs { display:flex; gap:8px; margin:18px 2px 12px; }
  .tab {
    flex:1; text-align:center; padding:8px; border-radius:10px; font-size:13px;
    border:1px solid var(--line); background:var(--panel); color:var(--muted); cursor:pointer;
  }
  .tab.active { color:var(--ink); border-color:var(--accent); background:var(--panel2); }
  .status-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; }
  .status-row { display:flex; align-items:center; gap:10px; padding:7px 0; font-size:14px; }
  .dot { width:8px; height:8px; border-radius:50%; flex:none; }
  .dot.voted { background:var(--good); }
  .dot.not { background:#555; }
  .status-empty { color:var(--muted); font-size:13px; text-align:center; padding:10px; }

  .bar {
    position:fixed; left:0; right:0; bottom:0; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 22%); 
  }
  .bar-inner { max-width:480px; margin:0 auto; }
  .submit {
    width:100%; padding:16px; border:none; border-radius:14px;
    background:var(--accent); color:#fff; font-size:16px; font-weight:800;
    font-family:inherit; cursor:pointer; transition:filter .15s, transform .08s;
    box-shadow:0 8px 24px rgba(255,106,43,.3);
  }
  .submit:active { transform:scale(.98); }
  .submit:disabled { background:#444; box-shadow:none; }
  .selcount { color:var(--accent2); }

  .loading, .locked-msg { text-align:center; padding:60px 20px; color:var(--muted); }
  .ball { font-size:44px; display:inline-block; animation:spin 1.4s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toast {
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%);
    background:var(--ink); color:var(--bg); padding:11px 20px; border-radius:30px;
    font-size:14px; font-weight:700; opacity:0; transition:opacity .25s; z-index:99;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  .toast.show { opacity:1; }
  .locked-badge {
    display:inline-block; background:rgba(255,106,43,.15); border:1px solid var(--accent);
    color:var(--accent2); padding:4px 12px; border-radius:20px; font-size:12px; margin-top:8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="app">
    <div class="loading"><div class="ball">🏀</div><p style="margin-top:14px">載入中…</p></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
let POLL = null, ME = { userId:null, name:null }, selected = new Set(), votersBySlot = {}, activeTab = "voted";

function $(id){ return document.getElementById(id); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
function getPollId(){ const u=new URL(location.href); return u.searchParams.get("poll") || (liff.getContext && liff.getContext().liffId); }

// 把 "5/31 18:00-20:00 台北運動中心" 拆成 時間 + 地點
function splitLabel(label){
  // 抓前面的日期時間，剩下的當地點
  const m = label.match(/^(\d{1,2}\/\d{1,2}\s+[\d:：\-~－]+)\s*(.*)$/);
  if (m) return { time:m[1].trim(), venue:m[2].trim() };
  // 退而求其次：第一段空白前當時間
  const parts = label.split(/\s+/);
  return { time: parts.slice(0,2).join(" "), venue: parts.slice(2).join(" ") };
}

async function init(){
  try {
    const cfg = await fetch("/api/config").then(r=>r.json());
    await liff.init({ liffId: cfg.liffId });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    ME = { userId: profile.userId, name: profile.displayName };
    await loadPoll();
  } catch(e){
    $("app").innerHTML = '<div class="loading">載入失敗 😢<br><span style="font-size:12px">'+(e.message||e)+'</span></div>';
  }
}

async function loadPoll(){
  const id = getPollId();
  const data = await fetch("/api/poll/"+id).then(r=>r.json());
  if (data.error){ $("app").innerHTML='<div class="loading">找不到這個投票</div>'; return; }
  POLL = data.poll; votersBySlot = data.votersBySlot || {};
  // 我目前投了哪些
  const my = await fetch("/api/poll/"+id+"/my?userId="+encodeURIComponent(ME.userId)).then(r=>r.json());
  selected = new Set(my.slotIds || []);
  render();
}

function render(){
  if (POLL.locked){ renderLocked(); return; }
  const slotsHtml = POLL.slots.map(s=>{
    const sp = splitLabel(s.label);
    const voters = votersBySlot[s.id] || [];
    const on = selected.has(s.id);
    return `
      <div class="slot ${on?'on':''}" data-id="${s.id}">
        <div class="check">${CHECK_SVG}</div>
        <div class="slot-main">
          <div class="slot-time">${sp.time}</div>
          ${sp.venue?`<div class="slot-venue">📍 ${sp.venue}</div>`:''}
        </div>
        <div class="slot-count"><span class="n">${voters.length}</span><span>人</span></div>
      </div>`;
  }).join("");

  $("app").innerHTML = `
    <div class="head">
      <div class="title">🏀 ${POLL.title}</div>
      <div class="sub">發起人：${POLL.owner_name||"—"}</div>
      <div class="me">你好，${ME.name} 👋 勾選你能配合的時段</div>
    </div>
    <div class="hint">可複選，選好後按最下面「送出」</div>
    ${slotsHtml}
    ${renderStatus()}
    <div class="bar"><div class="bar-inner">
      <button class="submit" id="submitBtn">送出我的選擇（已選 <span class="selcount" id="selN">${selected.size}</span> 個）</button>
    </div></div>
  `;
  bind();
}

function renderStatus(){
  // 已投：把所有投過票的人去重；未投：需要應到名單才準（這裡顯示已投的人）
  const votedSet = new Set();
  Object.values(votersBySlot).forEach(arr => arr.forEach(n => votedSet.add(n)));
  const voted = [...votedSet];
  return `
    <div class="tabs">
      <div class="tab ${activeTab==='voted'?'active':''}" data-tab="voted">✅ 已投 (${voted.length})</div>
      <div class="tab ${activeTab==='byslot'?'active':''}" data-tab="byslot">📋 各時段名單</div>
    </div>
    <div class="status-card" id="statusCard">${activeTab==='voted'?renderVoted(voted):renderBySlot()}</div>
  `;
}
function renderVoted(voted){
  if (!voted.length) return '<div class="status-empty">還沒有人投票</div>';
  return voted.map(n=>`<div class="status-row"><span class="dot voted"></span>${n}</div>`).join("");
}
function renderBySlot(){
  let h="";
  POLL.slots.forEach(s=>{
    const sp=splitLabel(s.label); const voters=votersBySlot[s.id]||[];
    h+=`<div class="status-row" style="display:block"><b>${sp.time}</b> <span style="color:var(--muted);font-size:12px">${sp.venue||""}</span> — ${voters.length}人<div class="voters-mini">${voters.length?voters.join("、"):"（無）"}</div></div>`;
  });
  return h;
}

function renderLocked(){
  const sorted = POLL.slots.map(s=>({...s,voters:votersBySlot[s.id]||[]})).sort((a,b)=>b.voters.length-a.voters.length);
  let h = `<div class="head"><div class="title">🏀 ${POLL.title}</div><div class="locked-badge">投票已結束</div></div>`;
  sorted.forEach((s,i)=>{
    const sp=splitLabel(s.label);
    h+=`<div class="slot" style="cursor:default">
      <div class="slot-main"><div class="slot-time">${i===0&&s.voters.length?'👑 ':''}${sp.time}</div>${sp.venue?`<div class="slot-venue">📍 ${sp.venue}</div>`:''}
      ${s.voters.length?`<div class="voters-mini">${s.voters.join("、")}</div>`:''}</div>
      <div class="slot-count"><span class="n">${s.voters.length}</span><span>人</span></div></div>`;
  });
  $("app").innerHTML = h;
}

function bind(){
  document.querySelectorAll(".slot").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.id;
      if(selected.has(id)){ selected.delete(id); el.classList.remove("on"); }
      else { selected.add(id); el.classList.add("on"); }
      $("selN").textContent=selected.size;
    });
  });
  document.querySelectorAll(".tab").forEach(t=>{
    t.addEventListener("click",()=>{ activeTab=t.dataset.tab; $("statusCard").innerHTML=activeTab==='voted'?renderVoted([...new Set(Object.values(votersBySlot).flat())]):renderBySlot(); document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.tab===activeTab)); });
  });
  $("submitBtn").addEventListener("click",submitVote);
}

async function submitVote(){
  const btn=$("submitBtn"); btn.disabled=true; btn.textContent="送出中…";
  try{
    const id=getPollId();
    const r=await fetch("/api/poll/"+id+"/vote",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ userId:ME.userId, name:ME.name, slotIds:[...selected] })
    }).then(r=>r.json());
    if(r.ok){
      votersBySlot=r.votersBySlot||{};
      toast("投票已送出！");
      render();
      setTimeout(()=>{ if(liff.isInClient()) liff.closeWindow(); }, 900);
    } else { toast(r.error==="locked"?"投票已結束":"送出失敗"); btn.disabled=false; }
  }catch(e){ toast("送出失敗，請重試"); btn.disabled=false; btn.textContent="送出我的選擇"; }
}

init();
</script>
</body>
</html>
